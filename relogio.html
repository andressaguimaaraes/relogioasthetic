<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .clock {
    display: flex;
    gap: 14px;
  }

  .box {
    position: relative;
    background: #1c1c1c;
    border-radius: 22px;
    width: 150px;
    height: 190px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }

  .digits {
    font-weight: 700;
    font-size: 118px;
    line-height: 0.92;
    color: #d6d6d6;
    letter-spacing: -4px;
    font-variant-numeric: tabular-nums;
  }

  .ampm {
    position: absolute;
    top: 16px;
    left: 18px;
    font-size: 26px;
    font-weight: 700;
    color: #d6d6d6;
    letter-spacing: 1px;
  }

  /* Ajuste responsivo para caber em embeds pequenos do Notion */
  @media (max-width: 360px) {
    .box { width: 120px; height: 136px; }
    .digits { font-size: 96px; }
  }
</style>
</head>
<body>
  <div class="clock">
    <div class="box">
      <span class="ampm" id="ampm">PM</span>
      <span class="digits" id="hours">12</span>
    </div>
    <div class="box">
      <span class="digits" id="minutes">06</span>
    </div>
  </div>

  <script>
    function pad(n) { return n < 10 ? "0" + n : "" + n; }

    function tick() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();
      const ampm = h >= 12 ? "PM" : "AM";

      h = h % 12;
      if (h === 0) h = 12;

      document.getElementById("hours").textContent = pad(h);
      document.getElementById("minutes").textContent = pad(m);
      document.getElementById("ampm").textContent = ampm;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
